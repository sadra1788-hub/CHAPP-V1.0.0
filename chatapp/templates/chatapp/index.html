<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>ورود به چت</title>
</head>
<body style="background-color: black; color: #FFD700; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h1 style="color: #FFD700;">✨ چت طلایی ✨</h1>
    <p style="color: white;">اسم اتاق رو وارد کن:</p>
    <input id="room-name-input" type="text" size="40" style="background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 8px;">
    <br><br>
    <input id="room-name-submit" type="button" value="ورود به اتاق" style="background: #FFD700; color: black; border: none; padding: 10px 20px; font-weight: bold;">
    <script>
        document.querySelector('#room-name-input').focus();
        document.querySelector('#room-name-input').onkeyup = function(e) {
            if (e.key === 'Enter') { document.querySelector('#room-name-submit').click(); }
        };
        document.querySelector('#room-name-submit').onclick = function(e) {
            var roomName = document.querySelector('#room-name-input').value;
            window.location.pathname = '/chat/' + roomName + '/';
        };
    </script>
</body>
</html>
